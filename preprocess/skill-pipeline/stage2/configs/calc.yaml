# UI-explorer pipeline config — LibreOffice Calc.
domain: libreoffice_calc
app_name: "LibreOffice Calc"
app_version: "7.3.7"

env_dir: vendor/gym-anything/benchmarks/cua_world/environments/libreoffice_calc_env

planner_task_id: _warmup

output_dir: preprocess/skill-pipeline/stage2/outputs/calc

n_workers: 8

# Use a high port range that does not collide with run-osworld (5xxx) or
# writer (9200) / impress (9100).
bridge_port_base: 9300

planner_model: claude-opus-4-6
worker_model: claude-sonnet-4-6
assembler_model: claude-opus-4-6

claude_cli_image: cw-claude-cli

task_timeout: 1800
max_actions: 80
action_wait: 1.0

planner_timeout: 600
assembler_timeout: 2400

text_v3_parallel: 4
