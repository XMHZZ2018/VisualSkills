# UI-explorer pipeline config — LibreOffice Impress.

# Identifies the skill output (skills/<domain>-{multimodal,text}-stage2/).
# Used by phases 4 (inline) and 5 (text-stage2 derivation).
domain: libreoffice_impress
app_name: "LibreOffice Impress"
app_version: "7.3.7"

env_dir: vendor/gym-anything/benchmarks/cua_world/environments/libreoffice_impress_env

# Synthetic minimal task that just launches the bare app and maximizes —
# no fixture file, no env-specific test logic.  Each gym-anything env we
# explore must have a sibling `_warmup` task with this contract.
planner_task_id: _warmup

# Where all pipeline artefacts land (relative to repo root).
# Contains plan/, workers/, skill/ (assembler output), and the curated
# region_to_guides.json mapping that drives Phase 4.
output_dir: preprocess/skill-pipeline/stage2/outputs/impress

# Fan-out.
n_workers: 8

# Bridge ports.  Planner does not need a bridge after its screenshot, so we
# reuse base for the planner's env and base+1..base+N for workers.  Use a
# high range to avoid collisions with run-gym-anything's 8766+ default.
bridge_port_base: 9100

# Models.
planner_model: claude-opus-4-6
worker_model: claude-sonnet-4-6
assembler_model: claude-opus-4-6

claude_cli_image: ga-claude-cli

# Per-worker budget.
task_timeout: 1800       # 30 min wall clock for the claude container
max_actions: 80          # soft cap the worker is told about in the prompt
action_wait: 1.0

# Phase 1 (planner) and Phase 3 (assembler) wall clocks.
planner_timeout: 600     # 10 min
assembler_timeout: 2400  # 40 min — reading 8 notes files + copying images

# Phase 5 (derive text-stage2 from mm-stage2) parallelism — Claude rate-limit bound.
text_v3_parallel: 4
