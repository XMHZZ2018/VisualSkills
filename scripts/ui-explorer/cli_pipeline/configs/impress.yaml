# UI-explorer pipeline config — LibreOffice Impress.

env_dir: vendor/gym-anything/benchmarks/cua_world/environments/libreoffice_impress_env

# Any valid task is fine — we only use it to get a clean idle Impress window.
# `add_animations` opens Impress with a neutral starting deck.
planner_task_id: add_animations

# Where all pipeline artefacts land.
output_dir: /tmp/ui_explorer_pipeline/impress

# Fan-out.
n_workers: 8

# Bridge ports.  Planner does not need a bridge after its screenshot, so we
# reuse base for the planner's env and base+1..base+N for workers.  Use a
# high range to avoid collisions with run-gym-anything's 8766+ default.
bridge_port_base: 9100

# Models.
planner_model: claude-opus-4-6
worker_model: claude-sonnet-4-6
assembler_model: claude-opus-4-6

claude_cli_image: ga-claude-cli

# Per-worker budget.
task_timeout: 1200       # 20 min wall clock for the claude container
max_actions: 40          # soft cap the worker is told about in the prompt
action_wait: 1.0

# Phase 0 / Phase 2 wall clocks.
planner_timeout: 600     # 10 min
assembler_timeout: 2400  # 40 min — reading 8 notes files + copying images
