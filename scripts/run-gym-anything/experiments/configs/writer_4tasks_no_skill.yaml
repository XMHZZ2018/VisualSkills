# LibreOffice Writer — 4 medium tasks, no skill (baseline).
# Step budget = task.json init.max_steps; timeout_sec disabled in run_task.py.
# Container-kill watcher prevents EPISODE-ENDED retries after cap.
model: claude-opus-4-6
skill_mode: none
env_dir: vendor/gym-anything/benchmarks/cua_world/environments/libreoffice_writer_env
result_dir: scripts/run-gym-anything/workspaces
task_timeout: 1800

task_list:
  - regulatory_page_numbering      # max_steps=50
  - safety_plan_sections           # max_steps=50
  - transcript_style_chaining      # max_steps=60
  - emergency_action_cards_layout  # max_steps=60

num_parallel: 4
rerun: true
log_level: INFO
