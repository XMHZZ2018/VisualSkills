# LibreOffice Writer with the multimodal-loader skill — full 24-task test set.
#
# Skill: skills/libreoffice_writer-multimodal-loader-v1/
#   - Same 23 topic folders as multimodal-v1 (symlinked).
#   - Adds tools/skill_server.py exposing load_topic(topic) MCP tool that
#     returns guide.md + every adjacent figXX.png atomically.
#   - SKILL.md preamble instructs the agent to call load_topic instead of
#     reading the *.md / fig*.png files directly.
#
# Compares head-to-head with writer_baseline_multimodal_skill.yaml.
model: claude-opus-4-6
skill_mode: multimodal-loader
env_dir: vendor/gym-anything/benchmarks/cua_world/environments/libreoffice_writer_env
result_dir: scripts/run-gym-anything/workspaces
task_timeout: 900   # 15 minutes

task_list:
  - bcp_draft_watermark
  - business_letter_formatting
  - chem_inventory_formatting
  - contract_redline_generation
  - emergency_action_cards_layout
  - engineering_inspection_report
  - esa_report_sections
  - interactive_hr_form_creation
  - lab_data_ole_embedding
  - legal_psa_finalization
  - maintenance_plan_orientation
  - manual_style_rebranding
  - mixed_column_layout_flyer
  - nih_grant_compliance
  - paperback_book_layout
  - performance_review_mail_merge
  - pii_masking_regex
  - policy_style_standardization
  - regulatory_page_numbering
  - safety_plan_sections
  - soil_report_image_insertion
  - sop_metadata_automation
  - spec_cross_reference_repair
  - transcript_style_chaining

num_parallel: 4
rerun: true
log_level: INFO
