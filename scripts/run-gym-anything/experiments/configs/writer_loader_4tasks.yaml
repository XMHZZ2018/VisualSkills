# Writer with the multimodal-loader skill (load_topic MCP tool) — 4-task probe.
#
# Skill: skills/libreoffice_writer-multimodal-loader-stage1/
#   - Symlinks all 23 topic folders from libreoffice_writer-multimodal-stage1
#   - Adds tools/skill_server.py exposing load_topic(topic) -> [guide.md text, fig01.png, ...]
#   - Adds a SKILL.md preamble instructing the agent to use load_topic instead
#     of Read for any *.md / fig*.png inside the skill.
#
# Tasks chosen: each currently scores ≤ 0.15 under mm-stage1 baseline, AND each
# lives in a topic area where the loader should help (page numbering / sections
# / image insertion / tables + captions).
model: claude-opus-4-6
skill_mode: multimodal-loader
env_dir: vendor/gym-anything/benchmarks/cua_world/environments/libreoffice_writer_env
result_dir: scripts/run-gym-anything/workspaces
task_timeout: 900   # 15 minutes

task_list:
  - regulatory_page_numbering
  - safety_plan_sections
  - soil_report_image_insertion
  - engineering_inspection_report

num_parallel: 4
rerun: true
log_level: INFO
