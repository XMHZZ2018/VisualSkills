# GIMP baseline (no skill) — 4 multimodal-skill-promising test tasks
model: claude-opus-4-6
skill_mode: none
env_dir: vendor/gym-anything/benchmarks/cua_world/environments/gimp_env_all_fast
result_dir: scripts/run-gym-anything/workspaces
task_timeout: 600   # 10 minutes

task_list:
  - lens_flare          # Filters → Light and Shadow → Lens Flare (nested menu, visual positioning)
  - pattern_fill        # Visual pattern picker, selection, fill (multi-step)
  - gradient_fill       # Gradient tool from toolbox, drag interaction
  - shear_horizontal    # Shear tool in toolbox, transform dialog

num_parallel: 4
rerun: true
use_cache: false
log_level: INFO
